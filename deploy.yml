name: Deploy to GitHub Pages with Secrets

on:
  push:
    branches:
      - main # ご自身のデフォルトブランチ名が「master」の場合はここを master に変更してください
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace setup variables with GitHub Secrets
        run: |
          sed -i "s|%%GAS_API_URL%%|${{ secrets.GAS_API_URL }}|g" index.html
          sed -i "s|%%LIFF_ID%%|${{ secrets.LIFF_ID }}|g" index.html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
